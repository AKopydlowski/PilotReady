# Render blueprint for the PilotReady backend (FastAPI).
#
# Deploy: push this repo to GitHub, then on Render choose "New +" → "Blueprint"
# and point it at the repo. Render reads this file and provisions the service.
#
# After the first deploy, seed the database ONCE (from your machine, with the
# Neon DATABASE_URL in your local .env):
#     python scripts/seed_db.py
services:
  - type: web
    name: pilotready-api
    runtime: python
    plan: free
    # Build the Python deps.
    buildCommand: pip install -r requirements.txt
    # $PORT is provided by Render.
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      # Paste your Neon connection string in the Render dashboard (kept secret).
      - key: DATABASE_URL
        sync: false
      # Strong random signing secret — Render generates and stores it for you.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      # Set this to your deployed frontend origin (your Vercel URL).
      - key: CORS_ORIGINS
        sync: false
      # Comma-separated admin emails (support panel access).
      - key: ADMIN_EMAILS
        value: akkraofficialone@gmail.com
      - key: PYTHON_VERSION
        value: "3.11.9"
